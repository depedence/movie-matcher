<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login page</title>
  <link th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <p class="login-title">Welcome back</p>

    <div id="error-banner" class="error-banner"></div>

    <div class="form-group">
      <label for="login-input">Username</label>
      <input id="login-input" type="text" name="username" placeholder="Username">
      <span id="username-error" class="field-error"></span>
    </div>

    <div class="form-group">
      <label for="password-input">Password</label>
      <input id="password-input" type="password" name="password" placeholder="Password">
      <span id="password-error" class="field-error"></span>
    </div>

    <button id="login-btn" type="button">Login</button>

  </div>
</div>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
