<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Matcher</title>
  <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
  <div class="home-shell">
    <header class="home-header">
      <div>
        <p class="hero-kicker">Movie Matcher</p>
        <h1 class="page-title">Movies</h1>
      </div>

      <div class="header-actions">
        <button id="home-refresh-btn" class="secondary-btn" type="button">Refresh</button>
        <button id="home-logout-btn" class="ghost-btn" type="button">Logout</button>
      </div>
    </header>

    <main class="home-content">
      <section id="featured-movie" class="featured-card hidden" aria-live="polite">
        <div class="featured-poster-wrap">
          <img id="featured-poster" class="featured-poster" alt="Featured movie poster">
          <div id="featured-poster-fallback" class="featured-poster-fallback hidden">No poster</div>
        </div>

        <div class="featured-details">
          <p class="section-label">Featured movie</p>
          <h2 id="featured-title">Movie title</h2>
          <p id="featured-description" class="featured-description">Movie description</p>

          <div class="featured-meta">
            <div class="meta-item">
              <span class="meta-label">Year</span>
              <span id="featured-year" class="meta-value">-</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Rating</span>
              <span id="featured-rating" class="meta-value">-</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">IMDb</span>
              <span id="featured-imdb" class="meta-value">-</span>
            </div>
          </div>

          <div id="featured-genres" class="tag-list"></div>
        </div>
      </section>

      <section class="catalog-section">
        <div class="section-head">
          <div>
            <p class="section-label">Movie list</p>
            <h2>All available movies</h2>
          </div>
          <span id="movies-count" class="movies-count">0 movies</span>
        </div>

        <div id="home-loading" class="info-card">Loading movies...</div>
        <div id="home-empty" class="info-card hidden">No movies found yet.</div>
        <div id="home-error" class="info-card error hidden">Failed to load this section.</div>

        <div id="movies-grid" class="movies-grid hidden"></div>
      </section>
    </main>
  </div>

  <div id="movie-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <p class="section-label">Movie details</p>
          <h3 id="movie-modal-title">Movie</h3>
        </div>
        <button id="close-movie-modal-btn" class="ghost-btn" type="button">Close</button>
      </div>

      <div class="modal-content">
        <div class="modal-poster-wrap">
          <img id="movie-modal-poster" class="modal-poster" alt="Movie poster">
          <div id="movie-modal-poster-fallback" class="modal-poster-fallback hidden">No poster</div>
        </div>

        <div class="modal-meta">
          <div class="modal-grid">
            <div class="meta-item">
              <span class="meta-label">ID</span>
              <span id="movie-modal-id" class="meta-value">-</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">IMDb</span>
              <span id="movie-modal-imdb" class="meta-value">-</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Year</span>
              <span id="movie-modal-year" class="meta-value">-</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Rating</span>
              <span id="movie-modal-rating" class="meta-value">-</span>
            </div>
          </div>

          <div class="meta-block">
            <span class="meta-label">Genres</span>
            <div id="movie-modal-genres" class="tag-list"></div>
          </div>

          <div class="meta-block">
            <span class="meta-label">Description</span>
            <p id="movie-modal-description" class="modal-description">-</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script th:src="@{/js/home.js}"></script>
</body>
</html>
